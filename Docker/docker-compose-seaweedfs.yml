services:

  # SeaweedFS Master
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-master
    command: 'master -ip=seaweedfs-master -metricsPort=9324'
    ports: 
      - "9333:9333"
    volumes:
      - ./data/seaweedfs-master:/data
    networks:
      - projet

  # SeaweedFS Volume
  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-volume
    depends_on:
      - seaweedfs-master
    command: 'volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -port=8080 -dir=/data -max=100 -metricsPort=9325'
    networks: 
      -projet

  # SeaweedFS Filer + S3 Gateway
  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-filer
    depends_on:
      - seaweedfs-volume
    command: 'filer -master=seaweedfs-master:9333 -s3 -s3.config=/etc/seaweedfs/s3.json -metricsPort=9326'
    ports:
      - "8888:8888"
      - "8333:8333"
    volumes:
      - ./config/s3.json:/etc/seaweedfs/s3.json
    networks:
      -projet

  # PostgreSQL
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepass
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - projet

  # Hive Metastore
  metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    environment:
      DB_DRIVER: postgres
      SERVICE_NAME: metastore
      IS_RESUME: "${IS_RESUME}"
      HIVE_METASTORE_WAREHOUSE_DIR: s3a://warehouse/
      S3_ENDPOINT: http://seaweedfs-filer:8333
      S3_PATH_STYLE_ACCESS: "true"
      HADOOP_OPTIONAL_TOOLS: hadoop-aws
    ports:
      - "9083:9083"
    depends_on:
      - postgres
      - seaweedfs-filer
    volumes:
      - ./config/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./config/postgresql-42.6.2.jar:/opt/hive/lib/postgresql-42.6.2.jar
      - ./config/seaweedfs-hadoop3-client-4.00.jar:/opt/hive/lib/seaweedfs-hadoop3-client-4.00.jar
    networks:
      - projet

  # Presto Query Engine
  presto:
    image: prestodb/presto:latest
    container_name: presto
    ports: 
      - "8088:8080"
    volumes:
      - ./config/presto:/opt/presto-server/etc
    depends_on:
      - metastore
    networks:
      - projet

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - projet

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/etc/grafana/dashboards
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - projet

  # Cadvisor for Docker metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor_seaweedfs
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - projet

# Networks
networks:
  projet:
    driver: bridge
